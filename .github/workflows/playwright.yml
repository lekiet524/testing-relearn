# .github/workflows/playwright.yml
name: 🧪 Playwright Tests

# Trigger: Khi nào workflow chạy?
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: # Cho phép chạy manual từ GitHub UI

# Jobs: Những việc cần làm
jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest # Chạy trên Ubuntu server của GitHub

    steps:
      # 1. Checkout code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: automation-playwright/package-lock.json

      # 3. Install dependencies + browsers
      - name: Install dependencies
        run: |
          cd automation-playwright
          npm ci
          npx playwright install --with-deps

      # 4. Run Playwright tests (chỉ chạy Chromium cho nhanh)
      - name: Run Playwright tests
        run: |
          cd automation-playwright
          npx playwright test --project=chromium --reporter=html

      # 5. Upload HTML report làm artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always() # Upload cả khi pass hay fail
        with:
          name: playwright-report-${{ github.run_number }}
          path: automation-playwright/playwright-report/
          retention-days: 30

      # 6. Upload screenshots nếu test fail
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: automation-playwright/test-results/
          retention-days: 7
